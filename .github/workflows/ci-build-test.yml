name: CI - Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./src/GenericLoggingHelper.sln

      - name: Build (Release)
        run: dotnet build ./src/GenericLoggingHelper.sln --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test ./src/GenericLoggingHelper.sln --configuration Release --no-build --verbosity normal
